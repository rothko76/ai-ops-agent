---
apiVersion: v1
kind: Namespace
metadata:
  name: agent-lab-bad-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-app
  namespace: agent-lab-bad-config
  labels:
    app: config-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-app
  template:
    metadata:
      labels:
        app: config-app
    spec:
      containers:
        - name: config-app
          image: busybox:1.36
          command: ["sh", "-c", "if [ \"$APP_MODE\" = \"prod\" ]; then echo 'app started'; while true; do sleep 3600; done; else echo \"invalid APP_MODE=$APP_MODE\"; exit 1; fi"]
          env:
            - name: APP_MODE
              value: "prod"
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
