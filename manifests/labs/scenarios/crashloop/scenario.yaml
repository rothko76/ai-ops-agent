---
apiVersion: v1
kind: Namespace
metadata:
  name: agent-lab-crashloop
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashy-app
  namespace: agent-lab-crashloop
  labels:
    app: crashy-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashy-app
  template:
    metadata:
      labels:
        app: crashy-app
    spec:
      containers:
        - name: crashy-app
          image: busybox:1.36
          command: ["sh", "-c", "echo 'intentional crash for lab'; exit 1"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
