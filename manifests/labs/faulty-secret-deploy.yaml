---
apiVersion: v1
kind: Namespace
metadata:
  name: agent-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-app
  namespace: agent-lab
  labels:
    app: broken-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: broken-app
  template:
    metadata:
      labels:
        app: broken-app
    spec:
      containers:
        - name: broken-app
          image: nginx:1.25
          env:
            - name: API_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: token
          ports:
            - containerPort: 80
