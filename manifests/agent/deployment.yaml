apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-ops-agent
  namespace: ai-ops-agent
  labels:
    app: ai-ops-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-ops-agent
  template:
    metadata:
      labels:
        app: ai-ops-agent
    spec:
      serviceAccountName: ai-ops-agent
      containers:
        - name: api
          image: ai-ops-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-ops-agent-env
                  key: OPENAI_API_KEY
            - name: AGENT_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-ops-agent-env
                  key: AGENT_API_TOKEN
            - name: OPENAI_MODEL
              valueFrom:
                secretKeyRef:
                  name: ai-ops-agent-env
                  key: OPENAI_MODEL
            - name: AGENT_CHAT_TIMEOUT_SECONDS
              value: "90"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: AGENT_MAX_CONCURRENT_REQUESTS
              value: "8"
            - name: AGENT_RATE_LIMIT_MAX_REQUESTS
              value: "30"
            - name: AGENT_RATE_LIMIT_WINDOW_SECONDS
              value: "60"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
